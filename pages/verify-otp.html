<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Code · Daily News Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .verify-container {
      max-width: 500px;
      margin: 3rem auto;
      padding: 2.5rem;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: var(--shadow);
    }

    .verify-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .verify-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .verify-header p {
      opacity: 0.7;
      font-size: 0.95rem;
    }

    .verify-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-group label i {
      color: var(--accent);
    }

    .otp-input-container {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin: 1.5rem 0;
    }

    .otp-input {
      width: 50px;
      height: 60px;
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--accent);
      transition: all 0.2s;
    }

    .otp-input:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 10px rgba(0, 102, 255, 0.2);
    }

    .otp-input.filled {
      border-color: var(--accent);
      background: var(--card-bg);
    }

    .email-display {
      background: rgba(0, 102, 255, 0.1);
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      margin: 1.5rem 0;
      font-size: 0.95rem;
      opacity: 0.8;
    }

    .verify-btn {
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .verify-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px var(--accent-glow);
    }

    .verify-btn:disabled {
      opacity: 0.6;
      transform: none;
      cursor: not-allowed;
    }

    .msg {
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .msg.success {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      border: 1px solid #22c55e;
    }

    .msg.error {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .resend-section {
      text-align: center;
      margin-top: 1.5rem;
      opacity: 0.7;
      font-size: 0.95rem;
    }

    .resend-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
    }

    .resend-link.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      text-decoration: none;
    }

    .timer {
      font-size: 0.85rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="verify-container">
      <div class="verify-header">
        <h1>🔐 Verify Your Email</h1>
        <p>Enter the 6-digit code sent to your email</p>
      </div>

      <div id="msgBox" class="msg" style="display: none;"></div>

      <form class="verify-form" id="verifyForm" novalidate>
        <div class="email-display">
          📧 Code sent to: <strong id="emailDisplay">loading...</strong>
        </div>

        <div class="form-group">
          <label for="otp1"><i class="fas fa-key"></i> Verification Code</label>
          <div class="otp-input-container">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp1" required>
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp2" required>
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp3" required>
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp4" required>
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp5" required>
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp6" required>
          </div>
        </div>

        <button type="submit" class="verify-btn" id="verifyBtn">
          <i class="fas fa-check"></i> Verify Code
        </button>
      </form>

      <div class="resend-section">
        Didn't receive the code? <span class="resend-link" id="resendLink" onclick="resendCode()">Resend</span>
        <div class="timer" id="timerDisplay" style="display: none; margin-top: 0.5rem;"></div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = (() => {
      const host = window.location.hostname;
      if (host === 'localhost' || host === '127.0.0.1') {
        return `http://${host}:5000/api`;
      }
      return '/api';
    })();

    let isSubmitting = false;
    let resendTimer = 0;

    function showMsg(text, type) {
      const box = document.getElementById('msgBox');
      box.className = `msg ${type}`;
      box.textContent = text;
      box.style.display = 'block';
    }

    // Get email and otp from sessionStorage (set by signup page)
    const email = sessionStorage.getItem('verifyEmail');
    const otp = sessionStorage.getItem('verifyOTP');

    if (!email) {
      showMsg('❌ Session expired. Please signup again.', 'error');
      document.getElementById('verifyForm').style.display = 'none';
      setTimeout(() => window.location.href = 'signup.html', 3000);
    } else {
      document.getElementById('emailDisplay').textContent = email;
    }

    // OTP input auto-focus
    const otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const value = e.target.value;
        // Only allow numbers
        if (!/^\d*$/.test(value)) {
          e.target.value = '';
          return;
        }
        if (value && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
        }
        e.target.classList.toggle('filled', value.length > 0);
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          otpInputs[index - 1].focus();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData('text');
        const digits = pasteData.replace(/\D/g, '').slice(0, 6);
        digits.split('').forEach((digit, i) => {
          if (i < otpInputs.length) {
            otpInputs[i].value = digit;
            otpInputs[i].classList.toggle('filled', digit.length > 0);
          }
        });
        if (digits.length === 6) {
          otpInputs[5].focus();
        }
      });
    });

    // Focus first input on load
    otpInputs[0].focus();

    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;

      const code = Array.from(otpInputs).map(input => input.value).join('');

      if (code.length !== 6) {
        return showMsg('❌ Please enter all 6 digits.', 'error');
      }

      if (!email) {
        return showMsg('❌ Email not found. Please signup again.', 'error');
      }

      isSubmitting = true;
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Verifying...';

      try {
        const res = await fetch(`${API_BASE}/auth/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp: code })
        });
        const data = await res.json();

        if (!res.ok) {
          showMsg(`❌ ${data.message || 'Verification failed.'}`, 'error');
        } else {
          showMsg('✅ Email verified! Redirecting to login...', 'success');
          // Clear session data
          sessionStorage.removeItem('verifyEmail');
          sessionStorage.removeItem('verifyOTP');
          // Redirect to login after 2 seconds
          setTimeout(() => window.location.href = 'login.html', 2000);
        }
      } catch (err) {
        showMsg('❌ Cannot connect to server. Make sure backend is running.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '✓ Verify Code';
        isSubmitting = false;
      }
    });

    function startResendTimer() {
      resendTimer = 60;
      const link = document.getElementById('resendLink');
      const timer = document.getElementById('timerDisplay');
      link.classList.add('disabled');
      timer.style.display = 'block';

      const interval = setInterval(() => {
        resendTimer--;
        timer.textContent = `Resend available in ${resendTimer}s`;
        if (resendTimer === 0) {
          clearInterval(interval);
          link.classList.remove('disabled');
          timer.style.display = 'none';
        }
      }, 1000);
    }

    async function resendCode() {
      if (resendTimer > 0 || !email) return;

      const link = document.getElementById('resendLink');
      link.textContent = '⏳ Sending...';

      try {
        const res = await fetch(`${API_BASE}/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, fullName: email.split('@')[0], password: 'dummy' })
        });
        const data = await res.json();
        showMsg('✅ New code sent to your email!', 'success');
        startResendTimer();
      } catch (err) {
        showMsg('❌ Failed to resend code.', 'error');
      } finally {
        link.textContent = 'Resend';
      }
    }

    // Start initial resend timer
    startResendTimer();
  </script>
</body>
</html>
