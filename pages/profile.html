<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile · Daily News Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .profile-hero { background:linear-gradient(135deg,#0066ff,#a855f7); border-radius:32px; padding:3rem 2rem; text-align:center; color:white; margin-bottom:2rem; position:relative; overflow:hidden; }
    .profile-hero::before { content:''; position:absolute; inset:0; background:url('https://picsum.photos/id/1/800/300') center/cover; opacity:0.1; }
    .avatar { width:100px; height:100px; border-radius:50%; object-fit:cover; border:4px solid white; margin-bottom:1rem; position:relative; z-index:1; }
    .avatar-placeholder { width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.2); border:4px solid white; display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:700; margin:0 auto 1rem; position:relative; z-index:1; }
    .profile-name { font-size:1.8rem; font-weight:700; position:relative; z-index:1; }
    .profile-email { opacity:0.85; margin-top:0.3rem; position:relative; z-index:1; }
    .profile-joined { opacity:0.7; font-size:0.85rem; margin-top:0.5rem; position:relative; z-index:1; }
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
    .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:20px; padding:1.5rem; text-align:center; }
    .stat-num { font-size:2rem; font-weight:700; color:var(--accent); }
    .stat-label { font-size:0.85rem; opacity:0.6; margin-top:0.3rem; }
    .section-title { font-size:1.3rem; font-weight:700; margin:2rem 0 1rem; display:flex; align-items:center; gap:0.5rem; }
    .saved-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; }
    .saved-card { background:var(--card-bg); border:1px solid var(--border); border-radius:20px; padding:1.2rem; cursor:pointer; transition:all 0.2s; }
    .saved-card:hover { transform:translateY(-3px); box-shadow:var(--shadow); border-color:var(--accent); }
    .saved-card h4 { font-size:1rem; margin-bottom:0.3rem; }
    .saved-card p { font-size:0.85rem; opacity:0.6; }
    .logout-btn { background:linear-gradient(135deg,#ef4444,#f97316); color:white; border:none; padding:0.9rem 2rem; border-radius:40px; font-weight:600; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:0.5rem; }
    .logout-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(239,68,68,0.3); }
    .empty-state { text-align:center; padding:3rem; color:var(--text); opacity:0.5; }
    .loading { text-align:center; padding:2rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-left">
        <div class="logo" onclick="window.location.href='../index.html'" style="cursor:pointer;">Daily News Digest</div>
        <ul class="nav-menu">
          <li><a href="../index.html">Home</a></li>
          <li><a href="category.html?cat=World">World</a></li>
          <li><a href="category.html?cat=Technology">Technology</a></li>
          <li><a href="category.html?cat=Sports">Sports</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <button id="darkToggle" class="dark-toggle"><i class="fas fa-moon"></i></button>
        <div class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></div>
      </div>
    </div>
  </nav>

  <div class="hamburger-dropdown" id="hamburgerDropdown">
    <div class="dropdown-header">
      <span>Quick Menu</span>
      <i class="fas fa-times" id="closeDropdown"></i>
    </div>
    <ul class="dropdown-menu"></ul>
  </div>
  <div class="dropdown-overlay" id="dropdownOverlay"></div>

  <main class="container" style="padding-top:2rem;">
    <div id="loadingState" class="loading">
      <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--accent);"></i>
      <p style="margin-top:1rem;opacity:0.6;">Loading your profile...</p>
    </div>

    <div id="profileContent" style="display:none;">
      <!-- Hero -->
      <div class="profile-hero">
        <div id="avatarEl"></div>
        <div class="profile-name" id="profileName">-</div>
        <div class="profile-email" id="profileEmail">-</div>
        <div class="profile-joined" id="profileJoined">-</div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="savedCount">0</div>
          <div class="stat-label">Saved Articles</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">📰</div>
          <div class="stat-label">News Reader</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">✅</div>
          <div class="stat-label">Verified</div>
        </div>
      </div>

      <!-- Saved Articles -->
      <div class="section-title">🔖 Saved Articles</div>
      <div id="savedArticlesGrid" class="saved-grid">
        <div class="empty-state">
          <div style="font-size:3rem;">📭</div>
          <p>No saved articles yet.<br>Tap 🔖 on any article to save it!</p>
        </div>
      </div>

      <!-- Logout -->
      <div style="margin-top:3rem;padding-bottom:2rem;">
        <button class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>
  </main>

  <script src="../assets/js/script.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    requireAuth();

    const API = 'http://localhost:5000/api';

    async function loadProfile() {
      const token = getToken();
      try {
        const res = await fetch(`${API}/user/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) { logout(); return; }

        const user = await res.json();

        // Avatar
        const avatarEl = document.getElementById('avatarEl');
        if (user.avatar) {
          const img = document.createElement('img');
          img.src = user.avatar;
          img.className = 'avatar';
          img.alt = user.fullName;
          avatarEl.appendChild(img);
        } else {
          const div = document.createElement('div');
          div.className = 'avatar-placeholder';
          div.textContent = user.fullName[0].toUpperCase();
          avatarEl.appendChild(div);
        }

        document.getElementById('profileName').textContent = user.fullName;
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('profileJoined').textContent =
          '📅 Member since ' + new Date(user.createdAt).toLocaleDateString('en-IN', { year:'numeric', month:'long' });
        document.getElementById('savedCount').textContent = user.savedArticles?.length || 0;

        // Saved articles
        if (user.savedArticles && user.savedArticles.length > 0) {
          // Get articles from script.js newsData if available
          const grid = document.getElementById('savedArticlesGrid');
          grid.innerHTML = '';
          user.savedArticles.forEach(id => {
            const card = document.createElement('div');
            card.className = 'saved-card';
            card.innerHTML = `
              <div style="font-size:1.5rem;margin-bottom:0.5rem;">📰</div>
              <h4>Article #${id}</h4>
              <p>Click to read the full article</p>
            `;
            card.addEventListener('click', () => {
              window.location.href = `article.html?id=${id}`;
            });
            grid.appendChild(card);
          });
        }

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('profileContent').style.display = 'block';

      } catch (err) {
        document.getElementById('loadingState').innerHTML =
          '<p style="color:#ef4444;">⚠️ Could not load profile. Make sure the server is running.</p>';
      }
    }

    loadProfile();
  </script>
</body>
</html>
