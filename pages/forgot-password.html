<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password · Daily News Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .auth-container { max-width:500px; margin:4rem auto; padding:2.5rem; background:var(--card-bg); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:32px; box-shadow:var(--shadow); }
    .auth-header { text-align:center; margin-bottom:2rem; }
    .auth-header h1 { font-size:2rem; background:linear-gradient(135deg,#0066ff,#a855f7); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:0.5rem; }
    .auth-header p { opacity:0.7; }
    .form-group { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:1.5rem; }
    .form-group label { font-weight:500; display:flex; align-items:center; gap:0.5rem; }
    .form-group label i { color:var(--accent); }
    .form-group input { padding:1rem; border-radius:16px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:1rem; transition:all 0.2s; }
    .form-group input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    .auth-btn { background:var(--accent); color:white; border:none; padding:1rem; border-radius:40px; font-weight:600; font-size:1.1rem; cursor:pointer; transition:all 0.2s; width:100%; }
    .auth-btn:hover { transform:translateY(-3px); box-shadow:0 10px 25px var(--accent-glow); }
    .auth-btn:disabled { opacity:0.6; transform:none; cursor:not-allowed; }
    .back-link { display:block; text-align:center; margin-top:1.5rem; color:var(--accent); text-decoration:none; font-weight:500; opacity:0.8; }
    .msg { padding:0.8rem 1rem; border-radius:12px; margin-bottom:1rem; font-size:0.9rem; text-align:center; }
    .msg.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444; }
    .msg.success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#22c55e; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-left">
        <div class="logo" onclick="window.location.href='../index.html'" style="cursor:pointer;">Daily News Digest</div>
      </div>
      <div class="nav-right">
        <button id="darkToggle" class="dark-toggle"><i class="fas fa-moon"></i></button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="auth-container">
      <div class="auth-header">
        <div style="font-size:3rem;margin-bottom:0.5rem;">🔐</div>
        <h1>Forgot Password?</h1>
        <p>Enter your email and we'll send you a reset link</p>
      </div>

      <div id="msgBox"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="forgotEmail" placeholder="Enter your email" required>
        </div>
        <button type="submit" class="auth-btn" id="submitBtn">📧 Send Reset Link</button>
      </form>

      <a href="login.html" class="back-link">← Back to Login</a>
    </div>
  </main>

  <script src="../assets/js/script.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    const API = 'http://localhost:5000/api';

    function showMsg(text, type) {
      const box = document.getElementById('msgBox');
      box.className = `msg ${type}`;
      box.textContent = text;
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      const email = document.getElementById('forgotEmail').value.trim();

      try {
        const res = await fetch(`${API}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        showMsg('✅ ' + data.message, 'success');
        document.getElementById('forgotForm').style.display = 'none';
      } catch {
        showMsg('Connection error. Make sure the server is running.', 'error');
        btn.disabled = false;
        btn.textContent = '📧 Send Reset Link';
      }
    });
  </script>
</body>
</html>
